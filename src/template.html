<!DOCTYPE html>
<html lang="en">
    <!-- https://to-do-app-dimad10s-projects.vercel.app/ -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo</title>
</head>
<body>
<div id="wrapper">
    <header>
        <h1 class="header-title">TODO</h1>
        <div class="nav-panel">
            <div class="search-container">
                <span class="search-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/></svg>
                </span>
                <input type="search" class="search-input" placeholder="Search note...">
            </div>
            <div class="select">
            <select name="category" id="category">
                <option value="">ALL</option>
                <option value="">COMPLETE</option>
                <option value="">INCOMPLETE</option>
            </select>
            </div>
            <button class="theme-btn">
                <svg xmlns="http://www.w3.org/2000/svg" height="30px" viewBox="0 -960 960 960" width="30px" fill="#1f1f1f"><path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Zm0-80q88 0 158-48.5T740-375q-20 5-40 8t-40 3q-123 0-209.5-86.5T364-660q0-20 3-40t8-40q-78 32-126.5 102T200-480q0 116 82 198t198 82Zm-10-270Z"/></svg>
            </button>
            <button class="add-btn">
                <svg xmlns="http://www.w3.org/2000/svg" height="30px" viewBox="0 -960 960 960" width="30px" fill="#1f1f1f"><path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/></svg>
            </button>
        </div>
    </header>
    <main>
        <section class="list-container">
            <!-- <div class="todo-item">
                <input type="checkbox" class="todo-checkbox">
                <span class="todo-text">texto de ejemplo</span>
                <div class="todo-actions">
                    <button class="edit-btn action-btn">edit</button>
                    <button class="delete-btn action-btn">delete</button>
                </div>
            </div> -->
        </section>
    </main>
    <div class="modal" id="modal">
        <div class="modal-card">
            <h2 class="modal-title">NEW NOTE</h2>
            <input type="text" class="modal-input" placeholder="New note...">
            <div class="modal-actions">
                <button class="btn-cancel modal-btn">CANCEL</button>
                <button class="btn-apply modal-btn">APPLY</button>
            </div>
        </div>
    </div>
</body>
</html>
